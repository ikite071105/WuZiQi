<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #upperButtons{
            display: flex;
            justify-content: space-around;
            align-items:baseline;
            width: 100%;
            height: 4vh;
            margin-top: 4%;
        }
        #lowerItems {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px; /* 增加边距 */
            box-sizing: border-box;
        }
        #leftChild {
            flex: 1; /* 占据剩余空间 */
            font-size: 4vw; /* 字体随屏幕宽度变化，PC端可改为固定像素 */
            /* min-font-size: 14px; */
        }
        #rightChild {
            flex: 1;
            display: none; /* 由 JS 控制显示 */
            flex-direction: row; /* 改为横向排列 */
            justify-content: flex-end; /* 靠右对齐 */
            gap: 10px; /* 两个按钮之间的间距 */
        }
        /* 按钮样式自适应 */
        #rightChild button {
            padding: 8px 12px;
            font-size: 3.5vw; /* 按钮文字自适应 */
            white-space: nowrap; /* 防止文字换行 */
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div>这里写胜负情况</div>
    <div id="upperButtons">
        <button id="newGame" onclick="newGame_click(gameState)">新游戏</button>
        <button id="modeChoose" onclick="modeChoose_click(gameState)">模式选择</button>
        <button id="boardSet" onclick="boardSet_click(gameState)">棋盘设置</button>
        <button id="ooooohhhh" onclick="ooooohhhh_click(gameState)">开挂?!</button>
    </div>
    

    <canvas id="chessboard">
    </canvas>

    <div id="lowerItems">
        <div id="leftChild">
            <span id="currentChess"></span>
            <br>
            <span id="regret">悔棋功能：
                <!-- 绑定 onchange，并传入 true/false -->
                <input type="radio" name="regret_choice" onchange="setRegret(true)">开
                <input type="radio" name="regret_choice" onchange="setRegret(false)" checked>关
            </span>
        </div>
        <div id="rightChild" style="display: none;">
            <button onclick="regretAction()">悔棋</button>
            <button onclick="confirmAction()">确认落子</button>
        </div>
    </div>

    <script src="./GameStruct.js"></script>
    <script src="./webDraw.js"></script>
    <script src="./keyFunction.js"></script>
    <script src="./ai.js"></script>

    <script>
        let size = 12;
        let wzq = new GobangGame(size);
        let chessB = new Chess('black');
        let chessW = new Chess('white');
        let current_chess = 0; //0白；1黑
        let current_mode = 0;  //0人人；1人机
        //悔棋
        let regret_enable = false;
        //上一步落子坐标
        let lastStep = { x: -1, y: -1 };
        //等待确认
        let isWaitingConfirm = false;
        //黑白正负次数记录
        let winCount_B = 0;
        let winCount_W = 0;
        //先手颜色
        let colorFirst = 0; //0白1黑
        //人机模式下玩家的颜色及先后手
        let playerColor = 0;
        let playerFirst = 1;    //1玩家0人机
        let current_player = 1; //1玩家0人机
    </script>

    <script>
        //绘图用
        //棋盘区域
        let w = window.innerWidth;
        let h = w;
        var boardCanvas = document.getElementById('chessboard');
        boardCanvas.width = w;
        boardCanvas.height = h;
        // 获取画笔（上下文对象）
        var board = boardCanvas.getContext('2d');
        console.log(board);

        let board_startW = w/12;
        let board_startH = h/12;
        let board_W = 10*w/12;
        let board_H = 10*h/12;
        //棋盘间距
        let dis = (board_W) / (wzq.size-1);

        function render() {
            board.clearRect(0, 0, w, h);
            // 永远先画底色或基础棋盘
            if (gameState.current !== gameState.PLAYING) {
                // 非进行时可以统一加个背景处理，或者让各函数自己画 draw_board
            }

            switch(gameState.current) {
                case gameState.PLAYING: draw_board(board, board_startW, board_startH, board_W, board_H, wzq);; break;
                case gameState.NEWGAME: draw_newGame(board, wzq, w, h); break;
                case gameState.GAMEOVER: draw_gameOver(board, wzq, w, h, current_chess); break;
                case gameState.BOARDSET: draw_boardSet(board, wzq, w, h, size); break;
                case gameState.MODECHOOSE: draw_modeChoose(board, wzq, w, h, current_mode); break;
                case gameState.MODESET_0: draw_modeSet_0(board, wzq, w, h, colorFirst); break;
                case gameState.MODESET_1: draw_modeSet_1(board, wzq, w, h, playerColor, playerFirst); break;
                // ... 其他状态
            }
            requestAnimationFrame(render);
        }
        render();

        //当前行动显示：
        function updateCurrentChessDisplay(){
            const chessDiv = document.getElementById('currentChess');
            if(current_chess){
                chessDiv.innerText = '当前行动：●黑子';
            }else{
                chessDiv.innerText = '当前行动：○白子';
            }
        }
        updateCurrentChessDisplay();
    </script>

    <script>
        //棋盘点击事件
       boardCanvas.onclick = (e) => {
        let x0 = e.offsetX;
        let y0 = e.offsetY;
        //游戏进行时：落子
        //条件：人人 或 人机&&玩家行动
        if (gameState.current == gameState.PLAYING && 
        ((!current_mode) || (current_mode && current_player))) {
            // 如果正在等待确认，不允许点棋盘其他地方
            if (isWaitingConfirm) return;

            let x1 = xy_from_canvas_to_board(x0, y0, board_startW, board_startH, dis, wzq).x1;
            let y1 = xy_from_canvas_to_board(x0, y0, board_startW, board_startH, dis, wzq).y1;

            if (wzq.board[x1][y1] == 0) {
                // 1. 落下棋子
                wzq.board[x1][y1] = current_chess + 1;
                lastStep = { x: x1, y: y1 }; // 记录坐标
                draw_board(board, board_startW, board_startH, board_W, board_H, wzq);

                // 2. 判断是否开启悔棋功能
                if (regret_enable) {
                    isWaitingConfirm = true;
                    document.getElementById('rightChild').style.display = 'block'; // 显示按钮
                } else {
                    // 没开悔棋
                    if (checkOver(current_chess, x1, y1)) {
                        gameState.current = gameState.GAMEOVER;
                    } else {
                        current_chess = 1 - current_chess;
                        updateCurrentChessDisplay();
                    }
                }
                //人下完了人机下
                if(current_mode){
                    current_player ^= current_player;//感觉事后可以删掉
                    //调用人机下棋函数
                    setTimeout(() => {
                        let x = aiAction_normal(wzq,current_chess)[0];
                        let y = aiAction_normal(wzq,current_chess)[1];
                        wzq.board[x][y] = current_chess + 1;
                        current_player = 0;
                        if (checkOver(current_chess, x, y)) {
                            gameState.current = gameState.GAMEOVER;
                        } else {
                            current_chess = 1 - current_chess;
                            updateCurrentChessDisplay();
                        }
                        current_player = 1;
                    }, 1000);
                }
            }
        }
        //新游戏：确认或取消
        else if(gameState.current==gameState.NEWGAME){
            let isConfirm = board.isPointInPath(confirmPath,x0,y0);
            let isCancel = board.isPointInPath(cancelPath,x0,y0);
            if(isCancel || isConfirm){
                if(isConfirm){
                    startNewGame();
                } 
                gameState.current = gameState.PLAYING;
            }     
        }
        //游戏结束：点击开始新游戏
        else if(gameState.current==gameState.GAMEOVER){
            let isNewgame = board.isPointInPath(newgamePath,x0,y0);
            if(isNewgame){
                startNewGame();
                gameState.current = gameState.PLAYING;
            }     
        }
        //棋盘大小设置
        else if(gameState.current==gameState.BOARDSET){
            let isPlus = board.isPointInPath(sizePlusPath,x0,y0);
            let isMinus = board.isPointInPath(sizeMinusPath,x0,y0);
            let isConfirm = board.isPointInPath(sizeConfirmPath,x0,y0);
            let isCancel = board.isPointInPath(sizeCancelPath,x0,y0);
            if(isPlus&&size<20) size++;
            if(isMinus&&size>8) size--;
            if(isCancel || isConfirm){
                if(isConfirm){
                    wzq.size = size;
                    wzq = new GobangGame(size);
                    startNewGame();
                }else{
                    size = wzq.size;
                }
                gameState.current = gameState.PLAYING;
            }     
        }
        //模式选择：人人/人机
        else if(gameState.current==gameState.MODECHOOSE){
            let isConfirm = board.isPointInPath(modeConfirmPath,x0,y0);
            let isCancel = board.isPointInPath(modeCancelPath,x0,y0);
            let isPVP = board.isPointInPath(pvpPath,x0,y0);
            let isPVE = board.isPointInPath(pvePath,x0,y0);
            if(isPVP) current_mode = 0;
            else if(isPVE) current_mode = 1;
            else if(isCancel || isConfirm){
                if(isConfirm){
                    gameState.current = (current_mode) ? gameState.MODESET_1 : gameState.MODESET_0;
                }else{
                    gameState.current = gameState.PLAYING;
                } 
            }     
        }
        //人人模式：先手选择
        else if(gameState.current==gameState.MODESET_0){
            let isConfirm = board.isPointInPath(modeConfirmPath,x0,y0);
            let isCancel = board.isPointInPath(modeCancelPath,x0,y0);
            let isBlackFirst = board.isPointInPath(blackFirstPath,x0,y0);
            let isWhiteFirst = board.isPointInPath(whiteFirstPath,x0,y0);
            if(isBlackFirst) colorFirst = 1;
            else if(isWhiteFirst) colorFirst = 0;
            else if(isConfirm){
                current_chess = colorFirst;
                updateCurrentChessDisplay();
                startNewGame();
                gameState.current = gameState.PLAYING;
            }else{
                gameState.current = gameState.MODECHOOSE;
            }   
        }
        //人机模式：黑白+先后手选择
        else if(gameState.current==gameState.MODESET_1){
            let isConfirm = board.isPointInPath(mode1ConfirmPath,x0,y0);
            let isCancel = board.isPointInPath(mode1CancelPath,x0,y0);
            let isBlack = board.isPointInPath(playerBlackPath,x0,y0);
            let isWhite = board.isPointInPath(playerWhitePath,x0,y0);
            let isFirst = board.isPointInPath(playerFirstPath,x0,y0);
            let isLast = board.isPointInPath(playerLastPath,x0,y0);
            if(isBlack) playerColor = 1;
            else if(isWhite) playerColor = 0;
            else if(isFirst) playerFirst = 1;
            else if(isLast) playerFirst = 0;
            else if(isConfirm){
                colorFirst = (playerFirst) ? playerColor : 1-playerColor;
                current_chess = colorFirst;
                updateCurrentChessDisplay();
                startNewGame();
                gameState.current = gameState.PLAYING;
            }else{
                gameState.current = gameState.MODECHOOSE;
            }   
        }
        }

        //胜利检测
        function checkOver(current_chess,x1,y1){
            let count = 1;
            let temp_x = x1-1;
            let result = 1;
            //纵连
            while(temp_x>=0 && wzq.board[temp_x][y1]==current_chess+1){
                temp_x--;
                count++;
            }
            temp_x = x1+1;
            while(temp_x<wzq.size && wzq.board[temp_x][y1]==current_chess+1){
                temp_x++;
                count++;
            }
            if(count>=5) return result;
            //横连
            let temp_y = y1-1;
            count = 1;
            while(temp_y>=0 && wzq.board[x1][temp_y]==current_chess+1){
                temp_y--;
                count++;
            }
            temp_y = y1+1;
            while(temp_y<wzq.size && wzq.board[x1][temp_y]==current_chess+1){
                temp_y++;
                count++;
            }
            if(count>=5) return result;
            //斜连(左上往右下)
            temp_x = x1-1;
            temp_y = y1-1;
            count = 1;
            while(temp_x>=0&&temp_y>=0 && wzq.board[temp_x][temp_y]==current_chess+1){
                temp_x--;
                temp_y--;
                count++;
            }
            temp_x = x1+1;
            temp_y = y1+1;
            while(temp_x<wzq.size&&temp_y<wzq.size && wzq.board[temp_x][temp_y]==current_chess+1){
                temp_x++;
                temp_y++;
                count++;
            }
            if(count>=5) return result;

            //斜连（左下往右上）
            temp_x = x1-1;
            temp_y = y1+1;
            count = 1;
            while(temp_x>=0&&temp_y<wzq.size && wzq.board[temp_x][temp_y]==current_chess+1){
                temp_x--;
                temp_y++;
                count++;
            }
            temp_x = x1+1;
            temp_y = y1-1;
            while(temp_x<wzq.size&&temp_y>=0 && wzq.board[temp_x][temp_y]==current_chess+1){
                temp_x++;
                temp_y--;
                count++;
            }
            if(count>=5) return result;
            else{
                result = 0;
                return result;
            }
        }
    
        //悔棋状态更新
        function setRegret(status) {
            regret_enable = status;
            
            // 调试用，可以在控制台看状态
            console.log("悔棋功能:", regret_enable ? "已开启" : "已关闭");
        }

        // 悔棋函数
        function regretAction() {
            if (!isWaitingConfirm) return;
            // 撤子
            wzq.board[lastStep.x][lastStep.y] = 0;
            isWaitingConfirm = false;
            // 隐藏按钮
            document.getElementById('rightChild').style.display = 'none';

            draw_board(board, board_startW, board_startH, board_W, board_H, wzq);
        }

        // 确认函数
        function confirmAction() {
            if (!isWaitingConfirm) return;

            isWaitingConfirm = false;
            document.getElementById('rightChild').style.display = 'none';

            // 检查胜负
            if (checkOver(current_chess, lastStep.x, lastStep.y)) {
                gameState.current = gameState.GAMEOVER;
            } else {
                current_chess = 1 - current_chess;
                updateCurrentChessDisplay();
            }
        }

        //开启新游戏的函数
        function startNewGame(){
            wzq.board = Array.from({ length: size }, () => Array(size).fill(0));
            if(current_mode){
                //人机模式
                if(playerFirst){
                    current_chess = playerColor;
                    current_player = 1;
                }else{
                    current_player = 0;
                    current_chess = 1-playerColor;
                    setTimeout(() => {
                    let x = aiAction_easy(wzq)[0];
                    let y = aiAction_easy(wzq)[1];
                    wzq.board[x][y] = current_chess + 1;
                    current_player = 1;
                    current_chess = 1 - current_chess;
                    updateCurrentChessDisplay();
                }, 1000);
                }
            }
        }
    </script>

    
</body>
</html>
